# Gideon — Hyprland integration
# Add to your Hyprland config:  source = /home/reign/ddrive/GenAI/Gideon/hypr-gideon.conf

# Start the Quickshell UI on login (daemonized). The edge handle sits on the
# left middle of the screen; click it (or press the keybind) to open Gideon.
exec-once = qs -d -p /home/reign/ddrive/GenAI/Gideon/frontend/shell.qml

# Toggle the panel from anywhere. SUPER+G.
bind = SUPER, G, exec, qs -p /home/reign/ddrive/GenAI/Gideon/frontend/shell.qml ipc call gideon toggle

# Optional: a layer rule so the slide animation isn't double-animated by Hyprland.
# layerrule = noanim, quickshell
